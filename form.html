<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description"
        content="Submit your product review with rating, features, installation date, and feedback. This form helps us improve products and track user experiences.">
    <meta name="author" content="Usanga, Mfon-Obong">
    <title>Product Review Form</title>
    <link rel="stylesheet" href="styles/form.css">
    <script src="scripts/form.js" defer></script>
</head>

<body>
    <header>
        <h1>Product Review Form</h1>
    </header>

    <main>
        <form method="get" action="review.html">
            <label for="product">Product Name:</label>
            <select id="product" name="product" required>
                <option value="" disabled selected>Select a Product ...</option>
            </select>

            <fieldset>
                <legend>Overall Rating:</legend>
                <label for="rating1">☆</label>
                <input type="radio" id="rating1" name="rating" value="1" required>
                <label for="rating2">☆☆</label>
                <input type="radio" id="rating2" name="rating" value="2" required>
                <label for="rating3">☆☆☆</label>
                <input type="radio" id="rating3" name="rating" value="3" required>
                <label for="rating4">☆☆☆☆</label>
                <input type="radio" id="rating4" name="rating" value="4" required>
                <label for="rating5">☆☆☆☆☆</label>
                <input type="radio" id="rating5" name="rating" value="5" required>
            </fieldset>

            <label for="installDate">Date of Installation:</label>
            <input type="date" id="installDate" name="installDate" required>

            <fieldset>
                <legend>Useful Features (check all that apply):</legend>
                <label for="feature1">Durability</label>
                <input type="checkbox" id="feature1" name="features" value="durability">
                <label for="feature2">Design</label>
                <input type="checkbox" id="feature2" name="features" value="design">
                <label for="feature3">Ease of Use</label>
                <input type="checkbox" id="feature3" name="features" value="ease">
                <label for="feature4">Affordability</label>
                <input type="checkbox" id="feature4" name="features" value="affordability">
            </fieldset>

            <label for="review">Written Review:</label>
            <textarea id="review" name="review" rows="4" cols="50"></textarea>

            <label for="username">Your Name:</label>
            <input type="text" id="username" name="username">

            <input type="submit" value="Submit Review">
        </form>
    </main>

    <footer>
        <p>&copy; 2026 WDD131 | All rights reserved</p>
    </footer>
</body>

</html>
